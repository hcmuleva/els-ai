apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: els-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: harishdell/els-ai-gateway:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: els-ai-config
            - secretRef:
                name: els-ai-secrets
          volumeMounts:
            - name: media-assets
              mountPath: /app/audio-images
            - name: media-assets
              mountPath: /app/assets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: media-assets
          persistentVolumeClaim:
            claimName: media-assets-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: els-ai
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 4000
      targetPort: 4000
