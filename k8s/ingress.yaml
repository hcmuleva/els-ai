apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: els-ai-ingress
  namespace: els-ai
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: emeelan.in
      http:
        paths:
          - path: /els-ai/api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  number: 4000
          - path: /els-ai(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
